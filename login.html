<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIZZERÍA ARSA - Iniciar sesión</title>
    <link rel="stylesheet" href="styles.css">
</head> 
<body>
    <main class="auth-layout">
        <section class="auth-info">
            <a class="logo" href="index.html"><span>🍕</span> PIZZERÍA ARSA</a>
            <h1>Bienvenido nuevamente</h1>
            <p>Ingresa para revisar el menú, consultar las ofertas de rescate y realizar pedidos disponibles.</p>
            <a class="boton boton-secundario" href="index.html">Volver al inicio</a>
        </section>

        <section class="auth-card">
            <h2>Iniciar sesión</h2>
            <form class="formulario" action="index.html">
                <div class="campo">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Ingrese su usuario" required>
                </div>
                <div class="campo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
                </div>
                <button type="submit">Ingresar</button>
            </form>
            <p>¿No tienes cuenta? <a class="etiqueta" href="registrar.html">Regístrate aquí</a></p>
        </section>
    </main>
</body>
</html>
