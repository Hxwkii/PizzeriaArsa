<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIZZERIA ARSA - Formulario de pedido</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-grid">
        <header class="header">
            <a class="logo" href="index.html"><span>ARSA</span> PIZZERIA ARSA</a>
            <nav class="nav">
                <a href="index.html">Inicio</a>
                <a href="menu.html">Menu</a>
                <a href="ofertas.html">Ofertas</a>
                <a class="activo" href="form_pedido.html">Pedido</a>
                <a href="pedidos.html">Pedidos</a>
                <a href="login.html">Login</a>
            </nav>
        </header>

        <main class="main">
            <section class="seccion">
                <h1>Formulario de pedido</h1>
                <p>Completa tus datos y selecciona los productos que deseas rescatar.</p>
            </section>

            <section>
                <form class="seccion formulario" action="pedidos.html" method="get" onsubmit="return enviarPedido(event)">
                    <h2>Datos del cliente</h2>
                    <div class="campo">
                        <label for="cliente">Nombre del cliente</label>
                        <input type="text" id="cliente" name="cliente" placeholder="Ingrese su nombre" required>
                    </div>
                    <div class="campo">
                        <label for="direccion">Direccion</label>
                        <input type="text" id="direccion" name="direccion" placeholder="Ingrese su direccion" required>
                    </div>
                    <div class="campo">
                        <label for="telefono">Telefono</label>
                        <input type="tel" id="telefono" name="telefono" placeholder="Ingrese su telefono" required>
                    </div>
                    <div class="campo">
                        <label for="cantidad">Cantidad</label>
                        <input type="number" id="cantidad" name="cantidad" min="1" value="1" onchange="actualizarResumenPedido()" required>
                    </div>

                    <h2>Seleccion de platos</h2>
                    <div class="check-grid">
                        <label class="check-item"><input type="checkbox" name="producto" value="Pizza Pepperoni" onchange="actualizarResumenPedido()"> Pizza Pepperoni</label>
                        <label class="check-item"><input type="checkbox" name="producto" value="Pizza Hawaiana" onchange="actualizarResumenPedido()"> Pizza Hawaiana</label>
                        <label class="check-item"><input type="checkbox" name="producto" value="Pizza Americana" onchange="actualizarResumenPedido()"> Pizza Americana</label>
                        <label class="check-item"><input type="checkbox" name="producto" value="Pizza Vegetariana" onchange="actualizarResumenPedido()"> Pizza Vegetariana</label>
                        <label class="check-item"><input type="checkbox" name="producto" value="Pizza Suprema" onchange="actualizarResumenPedido()"> Pizza Suprema</label>
                        <label class="check-item"><input type="checkbox" name="producto" value="Pizza Meat Lovers" onchange="actualizarResumenPedido()"> Pizza Meat Lovers</label>
                        <label class="check-item"><input type="checkbox" name="producto" value="Pizza 4 Quesos" onchange="actualizarResumenPedido()"> Pizza 4 Quesos</label>
                        <label class="check-item"><input type="checkbox" name="producto" value="Pizza Continental" onchange="actualizarResumenPedido()"> Pizza Continental</label>
                        <label class="check-item"><input type="checkbox" name="producto" value="Pizza Napolitana" onchange="actualizarResumenPedido()"> Pizza Napolitana</label>
                        <label class="check-item"><input type="checkbox" name="producto" value="Pan al Ajo" onchange="actualizarResumenPedido()"> Pan al Ajo</label>
                    </div>
                    <div id="resumenPedido" class="resumen-dinamico">Seleccione al menos un producto para calcular el total.</div>
                    <p id="pedidoMensaje" class="mensaje" hidden></p>
                    <button type="submit" onclick="actualizarResumenPedido()">Enviar pedido</button>
                </form>
            </section>
        </main>

        <footer class="footer"><p>PIZZERIA ARSA - Formulario de pedido</p></footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
