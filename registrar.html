<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIZZERIA ARSA - Registro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="auth-layout">
        <section class="auth-info">
            <a class="logo" href="index.html"><span>ARSA</span> PIZZERIA ARSA</a>
            <h1>Crea tu cuenta</h1>
            <p>Registrate para acceder a productos con descuento y apoyar la reduccion del desperdicio de alimentos.</p>
            <a class="boton boton-secundario" href="login.html">Ya tengo cuenta</a>
        </section>

        <section class="auth-card">
            <h2>Registrar usuario</h2>
            <form class="formulario" action="login.html" onsubmit="return validarRegistro(event)">
                <div class="campo">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre" required>
                </div>
                <div class="campo">
                    <label for="correo">Correo electronico</label>
                    <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="campo">
                    <label for="pass">Contrasena</label>
                    <input type="password" id="pass" name="pass" onchange="evaluarSeguridadRegistro()" required>
                </div>
                <div class="campo">
                    <label for="pass_confirm">Confirmar contrasena</label>
                    <input type="password" id="pass_confirm" name="pass_confirm" required>
                </div>
                <label class="check-item">
                    <input type="checkbox" id="verPasswordRegistro" onchange="mostrarOcultarPassword('pass', 'verPasswordRegistro')">
                    Mostrar contrasena
                </label>
                <p id="registroMensaje" class="mensaje" hidden></p>
                <button type="submit" onclick="evaluarSeguridadRegistro()">Registrar</button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
