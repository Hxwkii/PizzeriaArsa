<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIZZERÍA ARSA - Registro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="auth-layout">
        <section class="auth-info">
            <a class="logo" href="index.html"><span>🍕</span> PIZZERÍA ARSA</a>
            <h1>Crea tu cuenta</h1>
            <p>Regístrate para acceder a productos con descuento y apoyar la reducción del desperdicio de alimentos.</p>
            <a class="boton boton-secundario" href="login.html">Ya tengo cuenta</a>
        </section> 

        <section class="auth-card">
            <h2>Registrar usuario</h2>
            <form class="formulario" action="login.html">
                <div class="campo">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre" required>
                </div>
                <div class="campo">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="campo">
                    <label for="pass">Contraseña</label>
                    <input type="password" id="pass" name="pass" required>
                </div>
                <div class="campo">
                    <label for="pass_confirm">Confirmar contraseña</label>
                    <input type="password" id="pass_confirm" name="pass_confirm" required>
                </div>
                <button type="submit">Registrar</button>
            </form>
        </section>
    </main>
</body>
</html>
